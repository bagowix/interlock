name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job; the coverage job overrides it with
# the write scopes py-cov-action needs.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      INTERLOCK_TEST_REDIS_URL: redis://localhost:6379/0
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy --num-workers 2

      - name: Pyright
        run: uv run pyright

      - name: Tests
        run: uv run pytest --cov

  extras-min:
    name: Extras (minimum versions)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: '3.11'
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pin extras to minimum supported versions
        run: >-
          uv pip install
          'httpx2==2.4.0'
          'fastapi==0.128.0'
          'redis==5.0.0'
          'opentelemetry-api==1.43.0'
          'tenacity==9.0.0'
          'requests==2.31.0'
          'aiohttp==3.12.0'
          'litestar==2.23.0'

      - name: Integration tests against minimum versions
        run: >-
          uv run --no-sync pytest
          tests/test_httpx2.py
          tests/test_httpx2_e2e.py
          tests/test_fastapi.py
          tests/test_otel.py
          tests/test_redis_storage.py
          tests/test_tenacity.py
          tests/test_requests.py
          tests/test_aiohttp.py
          tests/test_litestar.py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      INTERLOCK_TEST_REDIS_URL: redis://localhost:6379/0
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest --cov

      - name: Coverage badge and PR comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
